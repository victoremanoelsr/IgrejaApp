    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                black: '#1a1a1a',
                white: '#ffffff',
                yellow: '#facc15', // yellow-400
                orange: '#f97316', // orange-500
                red: '#dc2626',    // red-600
                dark: '#0f0f0f'
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #f97316; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #dc2626; 
      }
      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-track {
        background: #1f2937;
      }
    </style>
